.container{

.banner{

height:auto;

border-radius:0;
overflow:visible;

}

.social a img{
width:58px;
height:58px;
object-fit:cover;
display:block;
}

/* BUTTON CARD */

.card{

padding:12px;

gap:12px;

.card img{

height:54px;
border-radius:8px;

.card span{

/* POSTER */

.poster{

.poster img{
width:100%;
border-radius:10px;
display:block;
}

.poster a{
display:block;
margin-top:10px;
background:#2a2a2a;
padding:13px;
border-radius:8px;
text-align:center;
text-decoration:none;
color:white;
font-size:14px;
